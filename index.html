<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучающая игра-викторина</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#121212f0;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background: white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

#question{
    font-size:22px;
    margin-bottom:20px;
}

.answer-btn{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.answer-btn:hover{
    background:#45a049;
}

#next-btn{
    margin-top:20px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2196F3;
    color:white;
    cursor:pointer;
    display:none;
}

#result{
    text-align:center;
    font-size:24px;
    margin-top:20px;
}

@media(max-width:600px){
    #question{
        font-size:18px;
    }

    .answer-btn{
        font-size:16px;
        padding:12px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Игра-викторина по программированию</h1>

    <div id="question"></div>

    <div id="answers"></div>

    <button id="next-btn">Следующий вопрос</button>

    <div id="result"></div>
</div>

<script>

const questions = [

{
question: "Что такое алгоритм?",
answers: [
"Язык программирования",
"План решения задачи",
"Математическая формула",
"Компьютерная программа"
],
correct: 1
},

{
question: "Что такое переменная?",
answers: [
"Изменяемая ячейка памяти",
"Текстовый комментарий",
"Постоянное число",
"Математический знак"
],
correct: 0
},

{
question: "Что такое компиляция?",
answers: [
"Исправление ошибок",
"Построчное выполнение",
"Перевод всего кода сразу",
"Написание программы"
],
correct: 2
},

{
question: "Что такое ветвление?",
answers: [
"Повторение команд",
"Выбор по условию",
"Разделение файлов",
"Остановка программы"
],
correct: 1
},

{
question: "Что такое cycle (цикл)?",
answers: [
"Главная функция",
"Ошибка в коде",
"Многократное повторение",
"Тип данных"

],
correct: 2
},

{
question: "Что такое массив?",
answers: [
"Список разных переменных",
"Список однотипных элементов",
"Текстовая строка",
"Логическое выражение"
],
correct: 1
},

{
question: "Что такое синтаксис?",
answers: [
"Логика программы",
"Скорость вычислений",
"Правила написания кода",
"Переводчик кода"
],
correct: 2
},

{
question: "Что такое отладка?",
answers: [
"Поиск ошибок",
"Запуск программы",
"Написание кода",
"Дизайн приложения"
],
correct: 0
},

{
question: "Что такое константа?",
answers: [
"Изменяемая величина",
"Логический оператор",
"Неизменяемая величина",
"Вывод текста"
],
correct: 2
},

{
question: "Что такое булев тип?",
answers: [
"Дробные числа",
"Целые числа",
"Символы и буквы",
"Значения True/False"   
],
correct: 3
},

{
question: "Что такое функция?",
answers: [
"Именованный блок кода",
"График на экране",
"Текстовая строка",
"Математическая ошибка"

],
correct: 0
},

{
question: "Что такое интерпретатор?",
answers: [
"Редактор кода",
"Построчный переводчик кода",
"База данных",
"Программа для дизайна"
],
correct: 1
},

{
question: "Что такое комментарий?",
answers: [
"Пояснение для человека",
"Команда для компьютера",
"Имя переменной",
"Ошибка в коде"
],
correct: 0
},

{
question: "Что такое логическая ошибка?",
answers: [
"Опечатка в слове",
"Неверный расчет программы",
"Пропущенная скобка",
"Сбой компьютера"
],
correct: 1
},

{
question: "Что такое дискретность алгоритма?",
answers: [
"Понятность команд",
"Наличие результата",
"Деление на шаги",
"Применимость везде"
],
correct: 2
},

{
question: "Что такое массовость алгоритма?",
answers: [
"Решение группы задач",
"Популярность программы",
"Большой размер кода",
"Работа по сети"
],
correct: 0
},

{
question: "Что такое детерминированность?",
answers: [
"Ограниченность шагов",
"Наличие интерфейса",
"Однозначность шагов",
"Скорость работы"
],
correct: 2
},

{
question: "Что такое высокоуровневый язык?",
answers: [
"Код из нулей",
"Язык для микросхем",
"Сложный язык",
"Близкий к человеческому"
],
correct: 3
},

{
question: "Что такое тип данных?",
answers: [
"Классификация информации",
"Скорость интернета",
"Имя папки",
"Модель процессора"
],
correct: 0
},

{
question: "Что такое ключевое слово?",
answers: [
"Пароль к коду",
"Зарезервированное имя команды",
"Длинное слово",
"Главная переменная"
],
correct: 1
}

];

let currentQuestion = 0;
let score = 0;

const questionElement = document.getElementById("question");
const answersElement = document.getElementById("answers");
const nextButton = document.getElementById("next-btn");
const resultElement = document.getElementById("result");

function showQuestion() {

    answersElement.innerHTML = "";
    nextButton.style.display = "none";

    const q = questions[currentQuestion];

    questionElement.innerText = q.question;

    q.answers.forEach((answer, index) => {

        const button = document.createElement("button");
        button.innerText = answer;
        button.classList.add("answer-btn");

        button.onclick = () => checkAnswer(index);

        answersElement.appendChild(button);

    });

}

function checkAnswer(index){

    const correct = questions[currentQuestion].correct;

    if(index === correct){
        score++;
    }

    nextButton.style.display = "block";

    const buttons = document.querySelectorAll(".answer-btn");

    buttons.forEach(button => {
        button.disabled = true;
    });

}

nextButton.onclick = () => {

    currentQuestion++;

    if(currentQuestion < questions.length){
        showQuestion();
    }
    else{
        showResult();
    }

};

function showResult(){

    questionElement.innerHTML = "";
    answersElement.innerHTML = "";
    nextButton.style.display = "none";

    resultElement.innerHTML =
    "Вы набрали " + score + " из " + questions.length + " баллов!";

}

showQuestion();

</script>

</body>
</html>
